name: Build and Deploy Hugo Site

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Setup Hugo
        run: |
          gh release download fork-latest --repo tomzxforks/hugo --pattern "hugo-linux-amd64" --output /usr/local/bin/hugo
          chmod +x /usr/local/bin/hugo
          hugo version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install jq and Pandoc
        run: |
          PANDOC_VERSION=$(curl -s https://api.github.com/repos/jgm/pandoc/releases/latest | jq -r '.tag_name')
          PANDOC_URL="https://github.com/jgm/pandoc/releases/download/${PANDOC_VERSION}/pandoc-${PANDOC_VERSION}-linux-amd64.tar.gz"
          wget -qO- "$PANDOC_URL" | sudo tar xz -C /tmp
          sudo mv /tmp/pandoc-${PANDOC_VERSION}/bin/pandoc /usr/local/bin/
          pandoc --version

      - name: Install LaTeX packages
        run: |
          sudo apt-get install -y texlive-xetex texlive-fonts-recommended texlive-latex-extra texlive-lang-english

      - name: Build with Hugo
        run: hugo --minify --cleanDestinationDir

      - name: Generate Pandoc exports (PDF, EPUB, BIBTeX)
        run: ./bin/generate-exports.sh

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
