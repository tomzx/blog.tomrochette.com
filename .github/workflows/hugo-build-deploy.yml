name: Build and Deploy Hugo Site

on:
  push:
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: Install jq and Pandoc
        run: |
          sudo apt-get update
          sudo apt-get install -y jq
          PANDOC_VERSION=$(curl -s https://api.github.com/repos/jgm/pandoc/releases/latest | jq -r '.tag_name')
          PANDOC_URL="https://github.com/jgm/pandoc/releases/download/${PANDOC_VERSION}/pandoc-${PANDOC_VERSION}-linux-amd64.tar.gz"
          wget -qO- "$PANDOC_URL" | sudo tar xz -C /usr/local/bin --strip-components=1
          pandoc --version

      - name: Install LaTeX packages
        run: |
          sudo apt-get install -y texlive-xetex texlive-fonts-recommended texlive-latex-extra texlive-lang-english

      - name: Build with Hugo
        run: hugo --minify --cleanDestinationDir

      - name: Generate Pandoc exports (PDF, EPUB, BIBTeX)
        run: ./bin/generate-exports.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hugo-site
          path: public

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
